<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromatic Burn</title>
  <style>
    body { margin:0; padding:20px; background:#0a0a0a; color:#fff; font-family:system-ui,sans-serif; text-align:center; }
    h1 { color:#ff0066; }
    p { max-width:600px; margin:0 auto 20px; opacity:0.9; }
    button { background:#ff0066; color:white; border:none; padding:14px 32px; font-size:18px; border-radius:50px; cursor:pointer; }
    canvas { max-width:100%; border:5px solid #ff0066; border-radius:12px; background:black; margin:20px 0; }
    .instructions { display:none; margin:20px auto; padding:20px; background:#1a1a1a; border-radius:12px; max-width:600px; font-size:18px; }
  </style>
</head>
<body>
  <h1>Chromatic Burn</h1>
  <p>Upload an image, stare at the red dot for 30 seconds, then look at a white surface.</p>

  <input type="file" id="upload" accept="image/*"><br><br>
  <button onclick="processImage()">Generate Stare Image</button>

  <canvas id="canvas"></canvas>

  <div class="instructions" id="instructions">
    Stare at the <span style="color:red;font-size:28px;">●</span> for 30 seconds, then look away at a white wall.
  </div>

  <script>
    function processImage() {
      const file = document.getElementById('upload').files[0];
      if (!file) return alert("Please select an image!");

      const img = new Image();
      img.onload = () => {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);

        const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = data.data;

        for (let i = 0; i < pixels.length; i += 4) {
          pixels = 255 - pixels ;     // Red
          pixels = 255 - pixels ;   // Green
          pixels = 255 - pixels ;   // Blue
        }

        ctx.putImageData(data, 0, 0);

        // Red dot
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(cx, cy, 22, 0, Math.PI * 2);
        ctx.fill();

        document.getElementById('instructions').style.display = 'block';
      };
      img.src = URL.createObjectURL(file);
    }
  </script>
</body>
</html>
