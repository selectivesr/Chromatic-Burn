<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chromatic Burn</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, sans-serif;
      text-align: center;
    }
    h1 {
      color: #ff0066;
      margin-bottom: 8px;
    }
    p {
      max-width: 600px;
      margin: 0 auto 20px;
      opacity: 0.9;
    }
    input {
      margin: 15px 0;
    }
    button {
      background: #ff0066;
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 18px;
      border-radius: 50px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #ff3388;
    }
    canvas {
      max-width: 100%;
      border: 5px solid #ff0066;
      border-radius: 12px;
      background: black;
      margin: 20px 0;
    }
    .instructions {
      display: none;
      margin-top: 20px;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 12px;
      font-size: 18px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <h1>Chromatic Burn</h1>
  <p>Upload an image, stare at the red dot for 30 seconds, then look at a white surface.</p>

  <input type="file" id="upload" accept="image/*"><br><br>
  <button onclick="processImage()">Generate</button>

  <canvas id="canvas"></canvas>

  <div class="instructions" id="instructions">
    Stare at the <span style="color:red; font-size:28px;">●</span> for 30 seconds,<br>then slowly look away at a blank white wall.
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const instructions = document.getElementById('instructions');

    function processImage() {
      const file = document.getElementById('upload').files[0];
      if (!file) return alert("Please select an image first!");

      const img = new Image();
      img.onload = () => {
        canvas.width = img.width;
        canvas.height = img.height;

        ctx.drawImage(img, 0, 0);

        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        for (let i = 0; i < data.length; i += 4) {
          data = 255 - data ;     // Red
          data = 255 - data ; // Green
          data = 255 - data ; // Blue
        }

        ctx.putImageData(imageData, 0, 0);

        // Draw red dot
        const cx = canvas.width / 2;
        const cy = canvas.height / 2;
        ctx.fillStyle = "#ff0000";
        ctx.beginPath();
        ctx.arc(cx, cy, Math.max(20, canvas.width * 0.04), 0, Math.PI * 2);
        ctx.fill();

        instructions.style.display = "block";
      };
      img.src = URL.createObjectURL(file);
    }
  </script>
</body>
</html>
